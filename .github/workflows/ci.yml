name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check / compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npx @vscode/vsce package --out gearlynx-debugger.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: gearlynx-debugger-vsix
          path: gearlynx-debugger.vsix
