name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check / compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npx @vscode/vsce package --out lynxdebug.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lynxdebug-vsix
          path: lynxdebug.vsix
