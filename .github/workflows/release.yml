name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npx @vscode/vsce package --out gearlynx-debugger.vsix

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to Visual Studio Marketplace
        run: npx @vscode/vsce publish --azure-credential --packagePath gearlynx-debugger.vsix

      - name: Publish to Open VSX
        run: npx ovsx publish gearlynx-debugger.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Attach VSIX to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: gearlynx-debugger.vsix
